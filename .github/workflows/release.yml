name: release

on:
  push:
    tags:
      - '@zenon-red/voize@*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: voize-linux-x64
          - target: bun-linux-arm64
            output: voize-linux-arm64
          - target: bun-darwin-x64
            output: voize-darwin-x64
          - target: bun-darwin-arm64
            output: voize-darwin-arm64
          - target: bun-windows-x64
            output: voize-windows-x64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p artifacts
          bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile=./artifacts/${{ matrix.output }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: artifacts/${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/@zenon-red/voize@')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: release-assets/*
          generate_release_notes: true
